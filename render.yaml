# MetaPelet Flask — live service: metapelet-bot-flask (Render)
# Custom domain: add www.metapelet.org in Render Dashboard → Settings → Custom Domains
# DNS: www CNAME → metapelet-bot-flask.onrender.com

services:
  - type: web
    name: metapelet-bot-flask
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    domains:
      - www.metapelet.org
      - metapelet.org
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
