# MetaPelet Flask app — app.metapelet.org
# Deploy: Render Dashboard → New Blueprint → connect Kristina130276/metapelet-app
# Or sync an existing Python Web Service with this repo + branch main.

services:
  - type: web
    name: metapelet-app
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    domains:
      - app.metapelet.org
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
