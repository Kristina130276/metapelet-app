<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaPelet</title>
    <style>
        body {
            background: #f5f7fa;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 24px 16px 48px;
            color: #333;
        }

        h1 {
            font-size: clamp(1.6rem, 4vw, 2rem);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1.05rem;
            color: #666;
            margin-bottom: 24px;
            max-width: 520px;
            margin-left: auto;
            margin-right: auto;
        }

        .card {
            max-width: 520px;
            margin: 0 auto 24px;
            background: white;
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            text-align: left;
        }

        .card h2 {
            margin: 0 0 16px;
            font-size: 1.25rem;
            text-align: center;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 1rem;
            margin-bottom: 6px;
            color: #444;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            box-sizing: border-box;
            font-size: 18px;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            font-family: inherit;
            color: #333;
            background: white;
        }

        .field textarea {
            min-height: 80px;
            resize: vertical;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: #4CAF50;
        }

        .hint {
            font-size: 0.95rem;
            color: #777;
            text-align: center;
            margin-bottom: 16px;
        }

        #save-anketa-btn {
            width: 100%;
            font-size: 1.15rem;
            padding: 14px 20px;
            border-radius: 14px;
            border: none;
            background: #1976d2;
            color: white;
            cursor: pointer;
        }

        #save-anketa-btn:hover {
            filter: brightness(1.05);
        }

        #anketa-status {
            margin-top: 12px;
            text-align: center;
            font-size: 1rem;
            min-height: 1.4em;
        }

        #talk-section {
            max-width: 520px;
            margin: 0 auto;
            text-align: center;
        }

        #talk-section.locked {
            opacity: 0.45;
            pointer-events: none;
        }

        #btn {
            font-size: 1.35rem;
            padding: 20px 36px;
            border-radius: 20px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        #btn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        #btn.active {
            background: #e53935;
        }

        #btn:hover:not(:disabled) {
            filter: brightness(1.08);
        }

        #status {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #555;
            min-height: 30px;
        }

        #reply-text {
            margin-top: 16px;
            padding: 14px 16px;
            background: #f0f7f0;
            border-radius: 12px;
            font-size: 1.05rem;
            line-height: 1.45;
            color: #333;
            text-align: left;
            display: none;
        }

        #reply-text.visible {
            display: block;
        }

        #play-reply-btn {
            display: none;
            width: 100%;
            margin-top: 14px;
            font-size: 1.05rem;
            padding: 14px 20px;
            border-radius: 14px;
            border: none;
            background: #888;
            color: white;
            cursor: pointer;
        }

        #play-reply-btn.visible {
            display: block;
        }

        .text-test summary {
            cursor: pointer;
            font-size: 0.9rem;
            color: #888;
            text-align: center;
            list-style: none;
        }

        #play-reply-btn:active {
            filter: brightness(0.95);
        }

        .text-test {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            text-align: left;
        }

        .text-test label {
            display: block;
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 8px;
        }

        #text-input {
            width: 100%;
            box-sizing: border-box;
            font-size: 18px;
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 12px;
            min-height: 56px;
            resize: vertical;
            font-family: inherit;
        }

        #text-send-btn {
            width: 100%;
            margin-top: 10px;
            font-size: 1.1rem;
            padding: 14px 20px;
            border-radius: 14px;
            border: none;
            background: #1976d2;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1 id="greeting">MetaPelet</h1>
<p class="subtitle">Заполните анкету один раз — разговор начнётся сам</p>

<div class="card" id="anketa-section">
    <h2>Анкета</h2>
    <p class="hint">Все поля нужны, чтобы MetaPelet говорила с вами по-дружески и бережно</p>

    <div class="field">
        <label for="name-input">Имя</label>
        <input id="name-input" type="text" placeholder="Как вас зовут?" autocomplete="name">
    </div>

    <div class="field">
        <label for="age-input">Возраст</label>
        <input id="age-input" type="number" min="1" max="120" placeholder="Сколько вам лет?">
    </div>

    <div class="field">
        <label for="language-input">Язык общения</label>
        <select id="language-input">
            <option value="ru-RU">Русский</option>
            <option value="he-IL">Иврит</option>
            <option value="en-US">English</option>
        </select>
    </div>

    <div class="field">
        <label for="interests-input">Интересы — что вам нравится</label>
        <textarea id="interests-input" placeholder="Например: песни, воспоминания, разговоры о семье"></textarea>
    </div>

    <div class="field">
        <label for="avoid-input">Чего лучше избегать в разговоре</label>
        <textarea id="avoid-input" placeholder="Например: медицина, советы, спорные темы"></textarea>
    </div>

    <button type="button" id="save-anketa-btn">Сохранить анкету</button>
    <p id="anketa-status"></p>
</div>

<div class="card locked" id="talk-section">
    <p class="hint" id="talk-hint">Сохраните анкету, чтобы открыть разговор</p>
    <button id="btn" type="button" disabled onclick="toggleDialog()">Завершить разговор</button>
    <p id="status"></p>
    <div id="reply-text" aria-live="polite"></div>
    <button type="button" id="play-reply-btn">Не слышно? Нажмите, чтобы повторить</button>
    <details class="text-test">
        <summary>Написать вместо голоса (для теста)</summary>
        <label for="text-input">Сообщение</label>
        <textarea id="text-input" rows="2" placeholder="Например: Привет, как дела?"></textarea>
        <button type="button" id="text-send-btn">Отправить</button>
    </details>
</div>

<script>
    const URL_PROFILE_ID = new URLSearchParams(window.location.search).get("profile") || "";
    const GREETING_TRIGGER = "__greeting__";

    const PRESETS = {
        sonya: {
            name: "Соня",
            age: "86",
            language: "ru-RU",
            interests: "добрые истории, прошлое и детство, русские народные песни (Катюша, Подмосковные вечера, Калинка, частушки)",
            avoid_topics: "болезни, медицина, лечение, советы, «надо», «нужно», споры, резкий тон"
        }
    };

    function getUserId() {
        let id = localStorage.getItem("metapelet_user_id");
        if (!id) {
            id = "user_" + Math.random().toString(36).slice(2, 10);
            localStorage.setItem("metapelet_user_id", id);
        }
        return id;
    }
    const USER_ID = getUserId();

    let anketa = {
        name: "",
        age: "",
        language: "ru-RU",
        interests: "",
        avoid_topics: "",
        profile_id: URL_PROFILE_ID,
        complete: false
    };

    let dialogActive = false;
    let recognition = null;
    let lastReplyText = "";
    let afterSpeakCallback = null;
    let cachedVoices = [];

    function loadVoices() {
        if (!window.speechSynthesis) return;
        cachedVoices = speechSynthesis.getVoices() || [];
    }
    if (window.speechSynthesis) {
        loadVoices();
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    function stripEmojis(text) {
        return (text || "")
            .replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\uFE0F]/gu, "")
            .replace(/\s{2,}/g, " ")
            .trim();
    }

    function textForSpeech(text) {
        return stripEmojis(text);
    }

    function pickVoice(lang) {
        const prefix = (lang || "ru-RU").split("-")[0];
        const voices = cachedVoices.length ? cachedVoices : (speechSynthesis.getVoices() || []);
        const local = voices.filter(v => v.lang && v.lang.startsWith(prefix));
        const ranked = local.sort((a, b) => {
            const score = v => {
                let s = 0;
                if (/google/i.test(v.name)) s += 4;
                if (/milena|katya|irina|anna|svetlana|helena|yandex/i.test(v.name)) s += 3;
                if (/natural|neural|premium|wavenet/i.test(v.name)) s += 2;
                if (/female|woman|жен/i.test(v.name + v.voiceURI)) s += 1;
                return s;
            };
            return score(b) - score(a);
        });
        return ranked[0] || voices.find(v => v.lang && v.lang.startsWith(prefix)) || null;
    }

    function hideReplayButton() {
        document.getElementById("play-reply-btn").classList.remove("visible");
    }

    function showReplayButton() {
        document.getElementById("play-reply-btn").classList.add("visible");
    }

    function loadAnketaFromStorage() {
        const raw = localStorage.getItem("metapelet_anketa");
        if (raw) {
            try {
                anketa = { ...anketa, ...JSON.parse(raw) };
            } catch (e) {
                console.warn("Не удалось прочитать анкету", e);
            }
        }
    }

    function fillFormFromAnketa() {
        document.getElementById("name-input").value = anketa.name || "";
        document.getElementById("age-input").value = anketa.age || "";
        document.getElementById("language-input").value = anketa.language || "ru-RU";
        document.getElementById("interests-input").value = anketa.interests || "";
        document.getElementById("avoid-input").value = anketa.avoid_topics || "";
        updateGreeting();
    }

    function applyPresetIfNeeded() {
        const key = URL_PROFILE_ID.trim().toLowerCase();
        if (!key || !PRESETS[key]) return;
        if (localStorage.getItem("metapelet_anketa")) return;
        anketa = { ...anketa, ...PRESETS[key], profile_id: key, complete: false };
        fillFormFromAnketa();
    }

    function readFormIntoAnketa() {
        anketa.name = document.getElementById("name-input").value.trim();
        anketa.age = document.getElementById("age-input").value.trim();
        anketa.language = document.getElementById("language-input").value;
        anketa.interests = document.getElementById("interests-input").value.trim();
        anketa.avoid_topics = document.getElementById("avoid-input").value.trim();
        if (URL_PROFILE_ID) {
            anketa.profile_id = URL_PROFILE_ID.trim().toLowerCase();
        }
    }

    function isAnketaValid() {
        return (
            anketa.name &&
            anketa.age &&
            anketa.language &&
            anketa.interests &&
            anketa.avoid_topics
        );
    }

    function updateGreeting() {
        document.getElementById("greeting").textContent =
            anketa.name ? `Привет, ${anketa.name}` : "MetaPelet";
    }

    function setTalkEnabled(enabled) {
        const section = document.getElementById("talk-section");
        const btn = document.getElementById("btn");
        const hint = document.getElementById("talk-hint");
        btn.disabled = !enabled;
        section.classList.toggle("locked", !enabled);
        hint.textContent = enabled
            ? "MetaPelet сама поздоровается и будет слушать вас."
            : "Сохраните анкету, чтобы начать разговор";
    }

    function saveAnketa() {
        readFormIntoAnketa();
        if (!isAnketaValid()) {
            document.getElementById("anketa-status").textContent =
                "Пожалуйста, заполните все поля анкеты.";
            setTalkEnabled(false);
            anketa.complete = false;
            return;
        }
        anketa.complete = true;
        localStorage.setItem("metapelet_anketa", JSON.stringify(anketa));
        document.getElementById("anketa-status").textContent =
            "Анкета сохранена ✓";
        updateGreeting();
        setTalkEnabled(true);
        unlockAudioForMobile();
        setTimeout(function() {
            if (!dialogActive) startDialog(true);
        }, 500);
    }

    function speechLangForAnketa() {
        const map = {
            "ru-RU": "ru-RU",
            "he-IL": "he-IL",
            "en-US": "en-US"
        };
        return map[anketa.language] || "ru-RU";
    }

    function setStatus(text) {
        document.getElementById("status").textContent = text;
    }

    function showReply(text) {
        const el = document.getElementById("reply-text");
        if (!text) {
            el.textContent = "";
            el.classList.remove("visible");
            hideReplayButton();
            lastReplyText = "";
            return;
        }
        lastReplyText = text;
        el.textContent = stripEmojis(text) || text;
        el.classList.add("visible");
        hideReplayButton();
    }

    function unlockAudioForMobile() {
        try {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (AC) {
                if (!window.__mpAudioCtx) {
                    window.__mpAudioCtx = new AC();
                }
                window.__mpAudioCtx.resume();
            }
        } catch (e) {
            console.warn("AudioContext unlock:", e);
        }
    }

    function playReplyManually() {
        if (!lastReplyText) return;
        unlockAudioForMobile();
        hideReplayButton();
        setStatus("Говорю...");
        speakReply(lastReplyText, function() {
            if (dialogActive && afterSpeakCallback) {
                afterSpeakCallback();
            } else if (dialogActive) {
                listenOnce();
            }
        });
    }

    function setBtn(active) {
        const btn = document.getElementById("btn");
        btn.style.display = active ? "inline-block" : "none";
        if (active) {
            btn.textContent = "Завершить разговор";
            btn.classList.add("active");
        } else {
            btn.textContent = "Завершить разговор";
            btn.classList.remove("active");
        }
    }

    function toggleDialog() {
        if (!anketa.complete) {
            setStatus("Сначала сохраните анкету.");
            return;
        }
        if (dialogActive) {
            stopDialog();
        } else {
            startDialog(true);
        }
    }

    function startDialog(withGreeting) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition && !withGreeting) {
            alert("Микрофон не поддерживается. Откройте в Chrome.");
            return;
        }
        dialogActive = true;
        setBtn(true);
        unlockAudioForMobile();
        if (withGreeting) {
            sendUserMessage(GREETING_TRIGGER, true);
        } else {
            listenOnce();
        }
    }

    function stopDialog(statusText) {
        dialogActive = false;
        setBtn(false);
        setStatus(statusText || "Диалог завершён");
        if (recognition) {
            recognition.abort();
            recognition = null;
        }
    }

    function listenOnce() {
        if (!dialogActive) return;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = speechLangForAnketa();
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        setStatus("Слушаю...");
        recognition.start();

        recognition.onresult = async function(event) {
            const userMessage = event.results[0][0].transcript;
            recognition = null;
            await sendUserMessage(userMessage);
        };

        recognition.onspeechend = function() {
            recognition.stop();
        };

        recognition.onerror = function(event) {
            console.error("SpeechRecognition error:", event.error);
            recognition = null;
            if (event.error === "no-speech") {
                setStatus("Не услышала... слушаю снова.");
                setTimeout(() => listenOnce(), 1500);
            } else if (event.error === "network") {
                setStatus("Микрофон недоступен (нет связи). Напишите сообщение ниже.");
                stopDialog();
            } else if (event.error === "aborted") {
                // stopDialog() или повторный start()
            } else if (event.error === "not-allowed") {
                stopDialog("Разрешите доступ к микрофону в настройках браузера.");
            } else {
                stopDialog("Ошибка микрофона: " + event.error);
            }
        };
    }

    async function sendUserMessage(userMessage, isGreeting) {
        const text = (userMessage || "").trim();
        if (!text) return;
        if (text === GREETING_TRIGGER) isGreeting = true;

        if (!dialogActive) {
            dialogActive = true;
            setBtn(true);
            unlockAudioForMobile();
        }

        setStatus(isGreeting ? "Здороваюсь..." : "Думаю...");
        hideReplayButton();

        const payload = {
            message: text,
            user_id: USER_ID,
            name: anketa.name,
            age: anketa.age,
            language: anketa.language,
            interests: anketa.interests,
            avoid_topics: anketa.avoid_topics
        };
        if (anketa.profile_id) {
            payload.profile_id = anketa.profile_id;
        }

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error("Сервер не ответил");

            const data = await response.json();
            showReply(data.reply);
            afterSpeakCallback = dialogActive ? listenOnce : null;
            setStatus("Говорю...");
            speakReply(data.reply, function() {
                if (dialogActive) listenOnce();
            });
        } catch (err) {
            console.error("Ошибка /chat:", err);
            setStatus("Что-то пошло не так...");
            speakReply("Что-то пошло не так. Попробуй ещё раз.", function() {
                if (dialogActive) listenOnce();
            });
        }
    }

    function sendTextMessage() {
        if (!anketa.complete) {
            setStatus("Сначала сохраните анкету.");
            return;
        }
        const input = document.getElementById("text-input");
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        sendUserMessage(text);
    }

    function speakBrowser(text, onEnd) {
        const spoken = textForSpeech(text);
        if (!spoken) {
            if (onEnd) onEnd();
            return;
        }
        if (!window.speechSynthesis) {
            setStatus("Готово — читайте текст ответа выше");
            showReplayButton();
            if (onEnd) onEnd();
            return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(spoken);
        utterance.lang = speechLangForAnketa();
        const voice = pickVoice(speechLangForAnketa());
        if (voice) utterance.voice = voice;
        utterance.rate = 0.86;
        utterance.pitch = 1.05;
        let finished = false;
        function done() {
            if (finished) return;
            finished = true;
            setStatus("Слушаю...");
            if (onEnd) onEnd();
        }
        utterance.onend = done;
        utterance.onerror = function() {
            showReplayButton();
            done();
        };
        window.speechSynthesis.speak(utterance);
        setTimeout(done, Math.min(20000, spoken.length * 130 + 2500));
    }

    async function speakReply(text, onEnd) {
        const spoken = textForSpeech(text);
        if (!spoken) {
            if (onEnd) onEnd();
            return;
        }
        unlockAudioForMobile();
        let audioUrl = null;
        try {
            const resp = await fetch("/tts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: spoken, language: anketa.language })
            });

            if (!resp.ok) throw new Error("TTS unavailable");

            const contentType = resp.headers.get("content-type") || "";
            if (!contentType.includes("audio")) throw new Error("Not audio");

            const blob = await resp.blob();
            audioUrl = URL.createObjectURL(blob);
            const audio = new Audio(audioUrl);

            audio.onended = function() {
                URL.revokeObjectURL(audioUrl);
                setStatus("Слушаю...");
                if (onEnd) onEnd();
            };

            audio.onerror = function() {
                URL.revokeObjectURL(audioUrl);
                speakBrowser(spoken, onEnd);
            };

            try {
                await audio.play();
            } catch (playErr) {
                URL.revokeObjectURL(audioUrl);
                showReplayButton();
                speakBrowser(spoken, onEnd);
            }
        } catch (e) {
            if (audioUrl) URL.revokeObjectURL(audioUrl);
            console.warn("Server TTS unavailable, using browser voice:", e);
            speakBrowser(spoken, onEnd);
        }
    }

    document.getElementById("save-anketa-btn").addEventListener("click", saveAnketa);
    document.getElementById("play-reply-btn").addEventListener("click", playReplyManually);
    document.getElementById("text-send-btn").addEventListener("click", sendTextMessage);
    document.getElementById("text-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendTextMessage();
        }
    });

    loadAnketaFromStorage();
    applyPresetIfNeeded();
    fillFormFromAnketa();
    setTalkEnabled(anketa.complete && isAnketaValid());
    if (anketa.complete) {
        document.getElementById("anketa-status").textContent = "Анкета сохранена ✓";
        unlockAudioForMobile();
        setTimeout(function() {
            if (!dialogActive && isAnketaValid()) startDialog(true);
        }, 1000);
    }
</script>

</body>
</html>
